<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Your Name | Links</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #f4f4f4;
      color: #111;
      display: flex;
      justify-content: center;
      padding: 24px;
    }
    main {
      width: 100%;
      max-width: 420px;
      text-align: center;
    }
    h1 {
      margin-bottom: 8px;
    }
    p {
      margin-top: 0;
      color: #555;
    }
    a {
      display: block;
      margin: 10px 0;
      padding: 12px;
      text-decoration: none;
      color: #111;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
    }
    a:hover {
      background: #eee;
    }
  </style>
</head>
<body>
  <main>
    <h1>Your Name</h1>
    <p>Short bio here</p>

    <a href="https://example.com" target="_blank" rel="noreferrer">Website</a>
    <a href="https://github.com/your-handle" target="_blank" rel="noreferrer">GitHub</a>
    <a href="https://linkedin.com/in/your-handle" target="_blank" rel="noreferrer">LinkedIn</a>
    <a href="mailto:you@example.com">Email</a>
  </main>
</body>
</html>
