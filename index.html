<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Link Page - CSS Level 1</title>
  <style>
  .center {
   flex-direction: column;
   display: flex;
   align-items: center;
   padding: 20px;
   }
    body {
      font-family: Arial, sans-serif;
      min-height: 94vh;
      display: grid;
      place-items: center;
      padding: 24px;
      
    }

    div {
     background: #faf7ea;
     border: 3px solid rgb(246, 223, 93); 
     border-radius: 12px;
     padding: 0 35px;
     }

    .links a {
      display: block;
      text-decoration: none;
      color: #111827;
      background: #fffcf1;
      border: 2px solid #faf4d4;
      border-radius: 8px;
      padding: 10px;
      margin: 20px 0;
      text-align: center;
    }


    a {
      display: block;
      margin: 8px 0;
    }

     h1 {
      margin: 20px 0;
    }
     p {
      margin: 4px 0;
    }
    
    .links a:hover {
      background: #fefbc6;
    }
    
  </style>
</head>
<body>
  <div>

  <header class="center">
    <h1>Olha Bezuhla</h1>
    <p>Dortmund, Germany </p>
    <p>studing in Leibniz Gymnasium, 10class </p>
  </header>

  <main class="links">
    
    <a href="https://olhabezuhla.github.io" target="_blank" rel="noreferrer">Website</a>
    <a href="https://github.com/olhabezuhla" target="_blank" rel="noreferrer">GitHub</a>
    <a href="mailto:ohla.bezuhla@dextradata.com">Email</a>
  </main>
</div>
</body>
</html>
