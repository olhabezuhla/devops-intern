<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Link Page - CSS Level 3</title>
  <style>
    :root {
      --bg: #eef6ff;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #475569;
      --accent: #2563eb;
      --accent-strong: #1d4ed8;
      --border: #cbd5e1;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Segoe UI", Tahoma, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 10%, #dbeafe 0%, transparent 35%),
        radial-gradient(circle at 90% 90%, #dcfce7 0%, transparent 35%),
        var(--bg);
    }

    .card {
      width: 100%;
      max-width: 440px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.12);
    }

    .avatar {
      width: 72px;
      height: 72px;
      margin: 0 auto 12px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: #dbeafe;
      color: #1e40af;
      font-weight: 700;
    }

    p {
      color: var(--muted);
      margin-bottom: 18px;
    }

    .links a {
      display: block;
      margin: 10px 0;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #f8fafc;
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
      transition: transform 0.15s ease, background 0.15s ease;
    }

    .links a:hover {
      transform: translateY(-2px);
      background: #eff6ff;
    }

    .links a.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #ffffff;
    }

    .links a.primary:hover {
      background: var(--accent-strong);
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="avatar">YN</div>
    <h1>Your Name</h1>
    <p>Short bio here.</p>

    <section class="links">
      <a class="primary" href="https://example.com" target="_blank" rel="noreferrer">Website</a>
      <a href="https://github.com/your-handle" target="_blank" rel="noreferrer">GitHub</a>
      <a href="https://linkedin.com/in/your-handle" target="_blank" rel="noreferrer">LinkedIn</a>
      <a href="mailto:you@example.com">Email</a>
    </section>
  </main>
</body>
</html>
