<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Link Page - CSS Level 1</title>
  <style>
  .center {
   flex-direction: column;
   display: flex;
   align-items: center;
   padding: 20px;
   }
    body {
      font-family: Arial, sans-serif;
      min-height: 80vh;
      display: grid;
      place-items: center;
      padding: 58px;
     background: radial-gradient(circle, #feca57 15%, #71B280 60%, #134E5E 100%);
      
    }
    .avatar {
      width: 72px;
      height: 72px;
      margin: 0 auto 12px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: #fcf9da;
      color: #f5e082;
      font-weight: 700;
      padding: 2px;
      border: 1px solid var(--border);
      box-shadow: 0 0px 0px rgba(26, 33, 12, 0.12);
    }

    div {
     background: #fffdf2;
     border: 1px solid #dcd56c;
     border-radius: 12px;
     padding: 0 35px;
     box-shadow: 0 12px 30px rgba(26, 33, 12, 0.12);
     }

    .links a {
      display: block;
      text-decoration: none;
      color: #111827;
      background: #fcf9da;
      border: 1px solid #f5e082;
      border-radius: 8px;
      padding: 10px;
      margin: 20px 0;
      text-align: center;
    }


    a {
      display: block;
      margin: 8px 0;
    }

     h1 {
      margin: 20px 0;
    }
     p {
      margin: 4px 0;
       color: #3b3724;
    }
    
    .links a:hover {
      transform: translateY(-2px);
      background: #fefbc6;
    }
    
  </style>
</head>
<body>
  <div>

  <header class="center">
    <img class="avatar" src="lemon3.png" alt="Lemon" width="500" height="333">
    <h1>Olha Bezuhla</h1>
    <p>Dortmund, Germany </p>
    <p>Studying in Leibniz Gymnasium, 10th grade</p>
  </header>

  <main class="links">
    
    <a href="https://olhabezuhla.github.io" target="_blank" rel="noreferrer">Website</a>
    <a href="https://github.com/olhabezuhla" target="_blank" rel="noreferrer">GitHub</a>
    <a href="mailto:ohla.bezuhla@dextradata.com">Email</a>
  </main>
</div>
</body>
</html>
