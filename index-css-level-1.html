<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Link Page - CSS Level 1</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 480px;
      margin: 32px auto;
      padding: 0 16px;
    }

    a {
      display: block;
      margin: 8px 0;
    }
  </style>
</head>
<body>
  <header>
    <h1>Your Name</h1>
    <p>Short bio here.</p>
  </header>

  <main>
    <h2>My Links</h2>
    <a href="https://example.com" target="_blank" rel="noreferrer">Website</a>
    <a href="https://github.com/your-handle" target="_blank" rel="noreferrer">GitHub</a>
    <a href="https://linkedin.com/in/your-handle" target="_blank" rel="noreferrer">LinkedIn</a>
    <a href="mailto:you@example.com">Email</a>
  </main>
</body>
</html>
