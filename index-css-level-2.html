<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Link Page - CSS Level 2</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
      display: flex;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: #ffffff;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }

    .links a {
      display: block;
      text-decoration: none;
      color: #111827;
      background: #f9fafb;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 10px;
      margin: 10px 0;
    }

    .links a:hover {
      background: #e5e7eb;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Your Name</h1>
    <p>Short bio here.</p>

    <section class="links">
      <a href="https://example.com" target="_blank" rel="noreferrer">Website</a>
      <a href="https://github.com/your-handle" target="_blank" rel="noreferrer">GitHub</a>
      <a href="https://linkedin.com/in/your-handle" target="_blank" rel="noreferrer">LinkedIn</a>
      <a href="mailto:you@example.com">Email</a>
    </section>
  </main>
</body>
</html>
